<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandro Siliuto | Art & Technology Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f0f0f0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        ::selection { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }
        
        .nav-link {
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00e5ff;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: #00e5ff; transform: translateY(-2px); }

        .btn-primary {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
        }

        .project-card {
            transition: transform 0.5s ease;
        }
        .project-card:hover {
            transform: translateY(-10px);
        }
        .project-card img {
            transition: transform 0.7s ease, opacity 0.5s ease;
        }
        .project-card:hover img {
            transform: scale(1.1);
            opacity: 0.3;
        }
        .project-overlay {
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }
        .project-card:hover .project-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes modal-enter {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal-enter {
            animation: modal-enter 0.3s ease-out forwards;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

        const SmartImage = ({ src, alt, className, fallbackText }) => {
            const [currentSrc, setCurrentSrc] = useState(src);
            const [hasError, setHasError] = useState(false);

            const handleError = () => {
                if (!hasError) {
                    setHasError(true);
                    setCurrentSrc(`https://via.placeholder.com/800x1000/0a0a0a/00e5ff?text=${encodeURIComponent(fallbackText || 'Sandro Siliuto')}`);
                }
            };

            return (
                <img 
                    src={currentSrc} 
                    alt={alt} 
                    className={className} 
                    onError={handleError}
                    loading="lazy"
                />
            );
        };
