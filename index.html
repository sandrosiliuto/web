<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandro Siliuto | Art & Technology Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f0f0f0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        ::selection { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }
        
        .nav-link {
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00e5ff;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: #00e5ff; transform: translateY(-2px); }

        .btn-primary {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
        }

        .project-card {
            transition: transform 0.5s ease;
        }
        .project-card:hover {
            transform: translateY(-10px);
        }
        .project-card img {
            transition: transform 0.7s ease, opacity 0.5s ease;
        }
        .project-card:hover img {
            transform: scale(1.1);
            opacity: 0.3;
        }
        .project-overlay {
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }
        .project-card:hover .project-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes modal-enter {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal-enter {
            animation: modal-enter 0.3s ease-out forwards;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Función para convertir enlaces de Google Drive en enlaces de imagen directa
        const getDriveUrl = (id) => id ? `https://docs.google.com/uc?export=view&id=${id}` : '';

        const SmartImage = ({ src, alt, className, fallbackText }) => {
            const [currentSrc, setCurrentSrc] = useState(src);
            const [hasError, setHasError] = useState(false);

            const handleError = () => {
                if (!hasError) {
                    setHasError(true);
                    setCurrentSrc(`https://via.placeholder.com/800x1000/0a0a0a/00e5ff?text=${encodeURIComponent(fallbackText || 'Sandro Siliuto')}`);
                }
            };

            return (
                <img 
                    src={currentSrc} 
                    alt={alt} 
                    className={className} 
                    onError={handleError}
                    loading="lazy"
                />
            );
        };

        const App = () => {
            const [activeCategory, setActiveCategory] = useState('Todos');
            const [scrolled, setScrolled] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);

            // WhatsApp y Enlaces
            const whatsappLink = "https://wa.me/34618514254?text=Hola%20Sandro,%20vengo%20de%20tu%20web%20y%20me%20gustaría%20un%20presupuesto.";
            
            // IDs de archivos de Google Drive (Deberás reemplazarlos con los IDs reales de tus archivos en la carpeta compartida)
            // He puesto marcadores de posición basados en tu estructura.
            const driveIds = {
                logo: "1V0p9z6_F6X-O_L8-qW6yO9N0_LwhEr", // Ejemplo de ID de logo
                impresion3d: "ID_DE_IMAGEN_IMPRESION_3D",
                personalizaciones: "ID_DE_IMAGEN_PERSONALIZACIONES",
                videomapping: "ID_DE_IMAGEN_VIDEOMAPPING",
                vr: "ID_DE_IMAGEN_VR",
                drones: "ID_DE_IMAGEN_DRONES",
                cosplay: "ID_DE_IMAGEN_COSPLAY"
            };

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const categories = ['Todos', 'Impresión 3D', 'Personalizaciones', 'Video Mapping', 'Realidad Virtual', 'Branding', 'I+D', 'Cosplay'];

            const projects = [
                { 
                    title: "Impresión 3D", 
                    category: "Impresión 3D", 
                    sub: "FDM · Resina", 
                    img: getDriveUrl(driveIds.impresion3d), 
                    description: "Fabricación digital de alta precisión. Especialista en acabados superficiales y prototipado rápido.",
                    gallery: [getDriveUrl(driveIds.impresion3d)]
                },
                { 
                    title: "Personalizaciones", 
                    category: "Personalizaciones", 
                    sub: "Pintura · Modding", 
                    img: getDriveUrl(driveIds.personalizaciones), 
                    description: "Acabados únicos para hardware y objetos cotidianos transformados en piezas de arte.",
                    gallery: [getDriveUrl(driveIds.personalizaciones)]
                },
                { 
                    title: "Video Mapping", 
                    category: "Video Mapping", 
                    sub: "Luz · Fachadas", 
                    img: getDriveUrl(driveIds.videomapping), 
                    description: "Transformación de espacios físicos a través de la proyección volumétrica.",
                    gallery: [getDriveUrl(driveIds.videomapping)]
                },
                { 
                    title: "Realidad Virtual", 
                    category: "Realidad Virtual", 
                    sub: "VR · Morrinho", 
                    img: getDriveUrl(driveIds.vr), 
                    description: "Experiencias inmersivas y visualización arquitectónica de alto impacto.",
                    gallery: [getDriveUrl(driveIds.vr)]
                },
                { 
                    title: "Drones & I+D", 
                    category: "I+D", 
                    sub: "FPV · Network Dancers", 
                    img: getDriveUrl(driveIds.drones),
                    description: "Investigación en captura de datos aéreos y pilotaje de precisión.",
                    gallery: [getDriveUrl(driveIds.drones)]
                },
                { 
                    title: "Cosplay & Props", 
                    category: "Cosplay", 
                    sub: "Fabricación", 
                    img: getDriveUrl(driveIds.cosplay), 
                    description: "Réplicas de alta fidelidad para cine y coleccionismo.",
                    gallery: [getDriveUrl(driveIds.cosplay)]
                }
            ];

            const Modal = ({ project, onClose }) => {
                if (!project) return null;
                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10">
                        <div className="absolute inset-0 bg-black/95 backdrop-blur-xl" onClick={onClose}></div>
                        <div className="relative bg-[#111] w-full max-w-5xl max-h-[90vh] overflow-y-auto border border-white/10 shadow-2xl rounded-lg animate-modal-enter hide-scrollbar">
                            <button onClick={onClose} className="absolute top-6 right-6 z-10 w-10 h-10 flex items-center justify-center bg-white/5 hover:bg-cyan-400 hover:text-black rounded-full transition-all">✕</button>
                            <div className="p-8 md:p-12">
                                <div className="mb-10">
                                    <span className="text-cyan-400 text-[10px] font-bold uppercase tracking-[0.4em] mb-4 block">{project.category}</span>
                                    <h2 className="text-4xl md:text-6xl font-black mb-4 uppercase tracking-tighter">{project.title}</h2>
                                    <div className="w-20 h-1 bg-cyan-400"></div>
                                </div>
                                <div className="grid grid-cols-1 gap-4 mb-12">
                                    {project.gallery.map((img, idx) => (
                                        <div key={idx} className="w-full bg-white/5 overflow-hidden border border-white/5">
                                            <SmartImage 
                                                src={img} 
                                                alt={`${project.title} ${idx}`} 
                                                className="w-full h-auto object-contain"
                                                fallbackText={project.title}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div className="border-t border-white/10 pt-10">
                                    <h3 className="text-sm font-bold uppercase tracking-widest text-gray-500 mb-6">Descripción del Proyecto</h3>
                                    <p className="text-xl text-gray-300 leading-relaxed font-light">{project.description}</p>
                                    <a href={whatsappLink} target="_blank" className="inline-block mt-8 bg-cyan-400 text-black px-8 py-3 font-bold text-xs uppercase tracking-widest hover:bg-white transition-all">Consultar presupuesto</a>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {/* Barra Superior */}
                    <div className="bg-[#111] border-b border-white/5 py-2 text-[10px] text-gray-500 uppercase tracking-widest px-6">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <span>📍 Tenerife · Londres · Bilbao</span>
                            <div className="flex gap-4">
                                <a href="https://instagram.com/sandrosiliuto" target="_blank" className="hover:text-cyan-400 transition-colors">Instagram</a>
                                <a href="#" className="hover:text-cyan-400 transition-colors">LinkedIn</a>
                            </div>
                        </div>
                    </div>

                    {/* Navegación */}
                    <nav className={`sticky top-0 z-50 transition-all duration-500 ${scrolled ? 'bg-black/90 backdrop-blur-md py-4 border-b border-cyan-500/20' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4 group cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="w-10 h-10 bg-black border border-white/10 rounded-sm overflow-hidden flex items-center justify-center">
                                    <SmartImage 
                                        src={getDriveUrl(driveIds.logo)} 
                                        className="w-full h-full object-cover" 
                                        alt="Logo Sandro Siliuto"
                                        fallbackText="S"
                                    />
                                </div>
                                <h1 className="text-xl font-bold tracking-tighter uppercase">SANDRO <span className="text-cyan-400 font-light">SILIUTO</span></h1>
                            </div>
                            <div className="hidden md:flex gap-10 items-center">
                                {['Work', 'Info', 'Contact'].map(item => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="nav-link text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">{item}</a>
                                ))}
                                <a href={whatsappLink} target="_blank" className="border border-cyan-400 text-cyan-400 px-6 py-2 text-[10px] font-bold uppercase tracking-widest hover:bg-cyan-400 hover:text-black transition-all">Presupuesto</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="max-w-7xl mx-auto px-6 pt-32 pb-24">
                        <div className="flex items-center gap-4 mb-6">
                            <div className="w-12 h-[1px] bg-cyan-400"></div>
                            <span className="text-cyan-400 text-[10px] uppercase tracking-[0.4em] font-semibold">Art & Technology Studio</span>
                        </div>
                        <h2 className="text-6xl md:text-9xl font-black leading-[0.85] tracking-tighter mb-10 uppercase">
                            Digital <br />
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Alchemy.</span>
                        </h2>
                        <div className="flex flex-wrap gap-6">
                            <button onClick={() => document.getElementById('work').scrollIntoView({behavior: 'smooth'})} className="btn-primary bg-cyan-400 text-black px-12 py-5 font-bold text-xs uppercase tracking-widest">Portafolio</button>
                            <a href={whatsappLink} target="_blank" className="btn-primary border border-white/20 hover:border-cyan-400 px-12 py-5 font-bold text-xs uppercase tracking-widest">WhatsApp Directo</a>
                        </div>
                    </header>

                    {/* Portafolio */}
                    <section id="work" className="max-w-7xl mx-auto px-6 mb-32">
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-10 mb-16">
                            <div><h3 className="text-4xl font-bold mb-4 uppercase tracking-tighter">Proyectos Seleccionados</h3><div className="w-10 h-1 bg-cyan-400"></div></div>
                            <div className="flex flex-wrap gap-2">
                                {categories.map(cat => (
                                    <button key={cat} onClick={() => setActiveCategory(cat)} className={`px-6 py-2 text-[9px] font-bold uppercase tracking-widest transition-all border ${activeCategory === cat ? 'bg-white text-black border-white' : 'border-white/10 text-gray-500 hover:border-cyan-400 hover:text-cyan-400'}`}>{cat}</button>
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {projects.filter(p => activeCategory === 'Todos' || p.category === activeCategory).map((p, i) => (
                                <div key={i} onClick={() => setSelectedProject(p)} className="project-card group relative bg-[#111] aspect-[3/4] overflow-hidden cursor-pointer rounded-sm border border-white/5">
                                    <SmartImage 
                                        src={p.img} 
                                        alt={p.title} 
                                        className="w-full h-full object-cover grayscale group-hover:grayscale-0"
                                        fallbackText={p.title}
                                    />
                                    <div className="project-overlay absolute inset-0 flex flex-col justify-end p-10 bg-gradient-to-t from-black via-black/40 to-transparent">
                                        <span className="text-cyan-400 text-[9px] font-bold uppercase tracking-widest mb-2">{p.category}</span>
                                        <h4 className="text-3xl font-bold mb-4 uppercase leading-none tracking-tighter">{p.title}</h4>
                                        <div className="flex items-center gap-3"><div className="w-6 h-[1px] bg-white/30 group-hover:w-12 transition-all"></div><span className="text-[10px] text-white/50 uppercase tracking-[0.3em]">Explorar</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Info & Contacto */}
                    <section id="info" className="max-w-7xl mx-auto px-6 py-32 grid md:grid-cols-2 gap-12 border-t border-white/5">
                        <div className="bg-[#111] p-12 border border-white/10">
                            <h3 className="text-3xl font-bold mb-6 uppercase tracking-tighter">Sobre el Estudio</h3>
                            <p className="text-gray-400 leading-relaxed mb-6">
                                Especialista en la intersección entre el mundo físico y digital. Con experiencia en Londres, Bilbao y Tenerife, desarrollo soluciones visuales y técnicas para marcas y artistas.
                            </p>
                            <div className="flex gap-4 items-center">
                                <div className="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></div>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-cyan-400">Disponible para proyectos 2024-2025</span>
                            </div>
                        </div>
                        <div id="contact" className="bg-[#111] p-12 border border-white/10 flex flex-col justify-center items-center text-center">
                            <h3 className="text-3xl font-bold mb-2 uppercase tracking-tighter">¿Hablamos?</h3>
                            <div className="space-y-6 w-full flex flex-col items-center mt-6">
                                <a href="mailto:ssiliutodesign@gmail.com" className="text-cyan-400 text-xl md:text-2xl font-semibold border-b border-cyan-400/30 hover:border-cyan-400 transition-all">
                                    ssiliutodesign@gmail.com
                                </a>
                                <a href={whatsappLink} target="_blank" className="bg-cyan-400 text-black px-10 py-4 font-bold text-xs uppercase tracking-widest hover:bg-white transition-all w-full max-w-xs">Solicitar Presupuesto</a>
                                <span className="text-[10px] text-gray-500 uppercase tracking-[0.3em]">+34 618 51 42 54</span>
                            </div>
                        </div>
                    </section>

                    {selectedProject && <Modal project={selectedProject} onClose={() => setSelectedProject(null)} />}

                    <footer className="py-12 text-center opacity-30 text-[9px] uppercase tracking-[0.5em]">
                        © {new Date().getFullYear()} Sandro Siliuto · Art & Technology Studio
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
