<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandro Siliuto | Art & Technology Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f0f0f0;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        ::selection { background: rgba(0, 229, 255, 0.2); color: #00e5ff; }
        
        .nav-link {
            transition: all 0.3s ease;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #00e5ff;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
        .nav-link:hover { color: #00e5ff; transform: translateY(-2px); }

        .btn-primary {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .btn-primary:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
        }

        .project-card {
            transition: transform 0.5s ease;
        }
        .project-card:hover {
            transform: translateY(-10px);
        }
        .project-card img {
            transition: transform 0.7s ease, opacity 0.5s ease;
        }
        .project-card:hover img {
            transform: scale(1.1);
            opacity: 0.3;
        }
        .project-overlay {
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(20px);
        }
        .project-card:hover .project-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        /* Modal Animations */
        @keyframes modal-enter {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-modal-enter {
            animation: modal-enter 0.3s ease-out forwards;
        }

        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
        }
        .active-dot { animation: pulse-cyan 2s infinite; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const App = () => {
            const [activeCategory, setActiveCategory] = useState('Todos');
            const [scrolled, setScrolled] = useState(false);
            const [selectedProject, setSelectedProject] = useState(null);

            // URL BASE DE TUS ARCHIVOS EN GITHUB
            const githubBase = "https://raw.githubusercontent.com/sandrosiliuto/web/main/";

            const playHoverSound = useCallback(() => {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                } catch (e) {}
            }, []);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // ORDEN SOLICITADO EXACTO
            const categories = [
                'Todos', 
                'Impresión 3D', 
                'Personalizaciones', 
                'Video Mapping', 
                'Realidad Virtual', 
                'Branding', 
                'I+D', 
                'Cosplay'
            ];

            // ESTRUCTURA DE PROYECTOS POR CARPETAS
            const projects = [
                { 
                    id: 1,
                    title: "Fabricación Aditiva", 
                    category: "Impresión 3D", 
                    sub: "FDM / Resina / Diseño", 
                    img: `${githubBase}impresion3d/main.jpg`, 
                    description: "Desarrollo de proyectos mediante impresión 3D avanzada. En esta sección se exploran desde prototipos industriales hasta esculturas de diseño paramétrico, utilizando materiales técnicos y acabados de alta calidad.",
                    gallery: [
                        `${githubBase}impresion3d/1.jpg`,
                        `${githubBase}impresion3d/2.jpg`,
                        `${githubBase}impresion3d/3.jpg`
                    ]
                },
                { 
                    id: 2,
                    title: "Custom Hardware", 
                    category: "Personalizaciones", 
                    sub: "Pintura · Modding", 
                    img: `${githubBase}personalizaciones/main.jpg`, 
                    description: "Transformación estética y funcional de equipos tecnológicos y objetos de colección. Aplicación de técnicas de pintura premium, texturizado y modificaciones estructurales únicas.",
                    gallery: [
                        `${githubBase}personalizaciones/1.jpg`,
                        `${githubBase}personalizaciones/2.jpg`
                    ]
                },
                { 
                    id: 3,
                    title: "Drones & Robótica", 
                    category: "I+D", 
                    sub: "Ingeniería · FPV", 
                    img: `${githubBase}drones/main.jpg`, 
                    description: "Investigación y desarrollo de sistemas aéreos no tripulados. Montaje de drones FPV personalizados para cine y prototipado de soluciones robóticas integradas.",
                    gallery: [
                        `${githubBase}drones/1.jpg`,
                        `${githubBase}drones/2.jpg`
                    ]
                },
                { 
                    id: 4,
                    title: "Entornos de Proyección", 
                    category: "Video Mapping", 
                    sub: "Luz · Espacio", 
                    img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=800", 
                    description: "Intervenciones visuales sobre superficies arquitectónicas y objetos. Creación de narrativas visuales mediante el control preciso de la luz.",
                    gallery: [] 
                },
                { 
                    id: 5,
                    title: "Mundos Inmersivos", 
                    category: "Realidad Virtual", 
                    sub: "VR · AR · XR", 
                    img: "https://images.unsplash.com/photo-1622979135225-d2ba269cf1ac?w=800", 
                    description: "Diseño de experiencias en entornos virtuales. Desarrollo de simulaciones interactivas y visualización de datos en espacios 3D.",
                    gallery: [] 
                },
                { 
                    id: 6,
                    title: "Identidad Visual", 
                    category: "Branding", 
                    sub: "Diseño Gráfico", 
                    img: "https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800", 
                    description: "Construcción de marcas con enfoque tecnológico. Desde logotipos hasta sistemas de identidad completos.",
                    gallery: [] 
                },
                { 
                    id: 7,
                    title: "Prop Maker", 
                    category: "Cosplay", 
                    sub: "Réplicas · Arte", 
                    img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800", 
                    description: "Fabricación de accesorios y trajes de alta fidelidad para la industria del entretenimiento y coleccionistas.",
                    gallery: [] 
                }
            ];

            const Modal = ({ project, onClose }) => {
                const scrollRef = useRef(null);
                if (!project) return null;

                const scroll = (direction) => {
                    if (scrollRef.current) {
                        const { scrollLeft, clientWidth } = scrollRef.current;
                        const scrollTo = direction === 'left' ? scrollLeft - clientWidth : scrollLeft + clientWidth;
                        scrollRef.current.scrollTo({ left: scrollTo, behavior: 'smooth' });
                    }
                };

                return (
                    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10">
                        <div className="absolute inset-0 bg-black/98 backdrop-blur-2xl" onClick={onClose}></div>
                        <div className="relative bg-[#111] w-full max-w-6xl max-h-[90vh] overflow-y-auto border border-white/10 shadow-2xl rounded-lg animate-modal-enter hide-scrollbar">
                            <button onClick={onClose} className="absolute top-6 right-6 z-10 w-10 h-10 flex items-center justify-center bg-white/5 hover:bg-cyan-400 hover:text-black rounded-full transition-all">✕</button>
                            
                            <div className="relative group bg-black/30">
                                <div ref={scrollRef} className="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar">
                                    {project.gallery.length > 0 ? project.gallery.map((img, idx) => (
                                        <div key={idx} className="min-w-full aspect-video snap-center">
                                            <img src={img} alt="" className="w-full h-full object-contain" onError={(e) => { e.target.src = 'https://via.placeholder.com/800x450?text=Sandro+Siliuto+Portfolio'; }} />
                                        </div>
                                    )) : (
                                        <div className="min-w-full aspect-video flex items-center justify-center text-gray-700 uppercase tracking-[0.4em] text-xs">
                                            Imágenes en preparación
                                        </div>
                                    )}
                                </div>
                                {project.gallery.length > 1 && (
                                    <>
                                        <button onClick={() => scroll('left')} className="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 p-4 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">←</button>
                                        <button onClick={() => scroll('right')} className="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 p-4 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">→</button>
                                    </>
                                )}
                            </div>

                            <div className="p-8 md:p-12">
                                <div className="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
                                    <div>
                                        <span className="text-cyan-400 text-[10px] font-bold uppercase tracking-[0.4em] mb-2 block">{project.category}</span>
                                        <h2 className="text-4xl md:text-5xl font-black uppercase tracking-tighter">{project.title}</h2>
                                    </div>
                                    <div className="text-right">
                                        <span className="text-xs text-gray-500 uppercase tracking-widest block mb-1">Especialidad</span>
                                        <span className="text-white font-medium">{project.sub}</span>
                                    </div>
                                </div>
                                
                                <div className="grid md:grid-cols-3 gap-12 border-t border-white/10 pt-10">
                                    <div className="md:col-span-2">
                                        <h3 className="text-sm font-bold uppercase tracking-widest text-cyan-400 mb-6">Detalles del Proyecto</h3>
                                        <p className="text-xl text-gray-300 leading-relaxed font-light">{project.description}</p>
                                    </div>
                                    <div className="bg-white/5 p-6 rounded-lg space-y-6 h-fit border border-white/5">
                                        <div>
                                            <span className="block text-[10px] uppercase text-gray-500 mb-2">Proceso Creativo</span>
                                            <span className="text-sm">Conceptualización · Técnica · Arte</span>
                                        </div>
                                        <div>
                                            <span className="block text-[10px] uppercase text-gray-500 mb-2">Repositorio</span>
                                            <span className="text-[10px] text-cyan-400 break-all">github.com/sandrosiliuto/web/tree/main/{project.category.toLowerCase().replace(' ', '')}</span>
                                        </div>
                                        <button onClick={onClose} className="w-full bg-cyan-400 text-black font-bold py-3 text-[10px] uppercase tracking-widest hover:bg-white transition-colors">Volver</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen">
                    {/* Top Bar */}
                    <div className="bg-[#111] border-b border-white/5 py-2 text-[10px] text-gray-500 uppercase tracking-widest px-6">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <span>📍 Tenerife · Londres · Bilbao</span>
                            <div className="flex gap-4">
                                <a href="https://instagram.com/sandrosiliuto" target="_blank" className="hover:text-cyan-400 transition-colors">Instagram</a>
                                <a href="https://linkedin.com/in/sandrosiliuto" target="_blank" className="hover:text-cyan-400 transition-colors">LinkedIn</a>
                            </div>
                        </div>
                    </div>

                    {/* Nav */}
                    <nav className={`sticky top-0 z-50 transition-all duration-500 ${scrolled ? 'bg-black/90 backdrop-blur-md py-4 border-b border-cyan-500/20' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-4 group cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                                <div className="w-10 h-10 bg-cyan-400 rounded-sm rotate-45 group-hover:rotate-180 transition-all duration-700 flex items-center justify-center">
                                    <div className="text-black font-black text-xl -rotate-45">S</div>
                                </div>
                                <h1 className="text-xl font-bold tracking-tighter uppercase">Sandro <span className="text-cyan-400 font-light">Siliuto</span></h1>
                            </div>
                            <div className="hidden md:flex gap-10 items-center">
                                {['Featured', 'Work', 'Info', 'Contact'].map(item => (
                                    <a key={item} href={`#${item.toLowerCase()}`} onMouseEnter={playHoverSound} className="nav-link text-[11px] font-bold uppercase tracking-[0.2em] text-gray-400">{item}</a>
                                ))}
                                <div className="w-2 h-2 bg-cyan-400 rounded-full active-dot"></div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="max-w-7xl mx-auto px-6 pt-32 pb-24">
                        <div className="flex items-center gap-4 mb-6">
                            <div className="w-12 h-[1px] bg-cyan-400"></div>
                            <span className="text-cyan-400 text-[10px] uppercase tracking-[0.4em] font-semibold">Art & Technology Studio</span>
                        </div>
                        <h2 className="text-6xl md:text-9xl font-black leading-[0.85] tracking-tighter mb-10 uppercase">
                            Digital <br />
                            <span className="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">Alchemy.</span>
                        </h2>
                        <div className="flex flex-wrap gap-6">
                            <button onClick={() => document.getElementById('featured').scrollIntoView({behavior: 'smooth'})} onMouseEnter={playHoverSound} className="btn-primary bg-cyan-400 text-black px-12 py-5 font-bold text-xs uppercase tracking-widest">Ver presentación</button>
                            <a href="#contact" onMouseEnter={playHoverSound} className="btn-primary border border-white/20 hover:border-cyan-400 px-12 py-5 font-bold text-xs uppercase tracking-widest flex items-center justify-center">Contactar</a>
                        </div>
                    </header>

                    {/* Presentación (Featured) */}
                    <section id="featured" className="max-w-7xl mx-auto px-6 mb-32">
                        <div className="relative w-full aspect-video bg-white/5 rounded-lg overflow-hidden border border-white/10 group">
                            <img 
                                src={`${githubBase}impresion3d/main.jpg`} 
                                className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 opacity-60 group-hover:opacity-100" 
                                alt="Sandro Siliuto Featured" 
                                onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1550745679-33f01f00882e?w=1200'; }}
                            />
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent flex flex-col justify-end p-8 md:p-16">
                                <span className="text-cyan-400 text-xs font-bold uppercase tracking-[0.3em] mb-4">Proyectos Destacados</span>
                                <h3 className="text-4xl md:text-6xl font-black mb-6 uppercase">Showcase 2024</h3>
                                <p className="text-gray-400 max-w-xl text-lg mb-8">Un recorrido por las últimas innovaciones en el estudio.</p>
                                <button className="w-fit bg-white text-black font-bold px-10 py-4 text-xs uppercase tracking-[0.2em] flex items-center gap-4 hover:bg-cyan-400 transition-colors">
                                    <span className="w-2 h-2 bg-black rounded-full animate-ping"></span> Ver Reel Completo
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* Portfolio Section */}
                    <section id="work" className="max-w-7xl mx-auto px-6 mb-32">
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-10 mb-16">
                            <div>
                                <h3 className="text-4xl font-bold mb-4 uppercase">Disciplinas</h3>
                                <div className="w-10 h-1 bg-cyan-400"></div>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {categories.map(cat => (
                                    <button 
                                        key={cat} 
                                        onClick={() => { setActiveCategory(cat); playHoverSound(); }} 
                                        className={`px-6 py-2 text-[10px] font-bold uppercase tracking-widest transition-all border ${activeCategory === cat ? 'bg-white text-black border-white' : 'border-white/10 text-gray-500 hover:border-cyan-400 hover:text-cyan-400'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 min-h-[400px]">
                            {projects.filter(p => activeCategory === 'Todos' || p.category === activeCategory).map((p) => (
                                <div key={p.id} onClick={() => { setSelectedProject(p); playHoverSound(); }} className="project-card group relative bg-[#111] aspect-[3/4] overflow-hidden cursor-pointer rounded-sm border border-white/5 shadow-xl">
                                    <img src={p.img} alt={p.title} className="w-full h-full object-cover grayscale group-hover:grayscale-0" onError={(e) => { e.target.src = 'https://via.placeholder.com/600x800?text=Sandro+Siliuto'; }} />
                                    <div className="project-overlay absolute inset-0 flex flex-col justify-end p-10 bg-gradient-to-t from-black via-black/40 to-transparent">
                                        <span className="text-cyan-400 text-[9px] font-bold uppercase tracking-widest mb-2">{p.category}</span>
                                        <h4 className="text-3xl font-bold mb-4 uppercase leading-none tracking-tighter">{p.title}</h4>
                                        <div className="flex items-center gap-3">
                                            <div className="w-6 h-[1px] bg-white/30 group-hover:w-12 transition-all"></div>
                                            <span className="text-[10px] text-white/50 uppercase tracking-[0.3em]">Explorar Trabajos</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Trayectoria & Contacto */}
                    <section id="info" className="max-w-7xl mx-auto px-6 py-32 grid md:grid-cols-2 gap-12">
                        <div className="bg-[#111] p-12 border border-white/10">
                            <h3 className="text-3xl font-bold mb-6 uppercase tracking-tighter">Trayectoria</h3>
                            <p className="text-gray-400 leading-relaxed mb-4">
                                Formado en <strong>Londres</strong>, mi trabajo se centra en el punto de encuentro entre el diseño industrial y el arte contemporáneo. He colaborado con marcas y estudios para desarrollar soluciones físicas a partir de ideas digitales.
                            </p>
                            <p className="text-gray-400 leading-relaxed mb-6">
                                Especializado en la creación de piezas únicas y experiencias visuales a medida.
                            </p>
                            <p className="text-cyan-400 font-bold uppercase tracking-widest text-xs">✦ Digital Alchemy · London Trained · Global Vision</p>
                        </div>
                        <div id="contact" className="bg-[#111] p-12 border border-white/10 flex flex-col justify-center items-center text-center">
                            <h3 className="text-3xl font-bold mb-2 uppercase tracking-tighter">¿Hablamos?</h3>
                            <p className="text-gray-500 mb-8 tracking-wide">Cuéntame tu idea y la haremos realidad.</p>
                            <div className="space-y-6">
                                <a href="mailto:ssiliutodesign@gmail.com" onMouseEnter={playHoverSound} className="block text-cyan-400 text-xl md:text-2xl font-semibold border-b border-cyan-400/30 hover:border-cyan-400 transition-all">
                                    ssiliutodesign@gmail.com
                                </a>
                                <div className="flex flex-col items-center gap-2">
                                    <span className="text-xs text-gray-500 uppercase tracking-widest">Teléfono Directo</span>
                                    <a href="tel:+34618514254" className="text-white/80 font-mono text-lg tracking-widest hover:text-cyan-400 transition-colors">+34 618 51 42 54</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Modal Render */}
                    {selectedProject && <Modal project={selectedProject} onClose={() => setSelectedProject(null)} />}

                    <footer className="py-12 text-center opacity-30 text-[9px] uppercase tracking-[0.5em]">
                        © {new Date().getFullYear()} Sandro Siliuto · Studio Art & Tech
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
